services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_lab18
    ports:
      - "6333:6333" # Cổng REST API (Dùng cho QdrantClient host/port)[cite: 2]
      - "6334:6334" # Cổng gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: no
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5